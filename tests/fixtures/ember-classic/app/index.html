      The `{{rootURL}}` and `{{config.assetsPath}}` placeholders are
      Handlebars expressions that ember-cli substitutes at build time. They
      are never resolvable as on-disk specifiers, so the Ember plugin's
      `generated_import_substrings` (`{{`, `###`) must keep them out of
      `unresolved-import` reporting.
    -->
    <script src="{{rootURL}}assets/vendor.js"></script>
